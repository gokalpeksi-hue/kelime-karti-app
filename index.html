<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İngilizce Kelime Kartları</title>

    <!-- Favicon – çoklu boyut desteği -->
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">

    <!--
        NOT: style.css harici olarak da mevcuttur.
        GitHub Pages'te harici CSS'in yüklenememesi durumunda
        aşağıdaki inline stiller devreye girer.
    -->
    <link rel="stylesheet" href="style.css">

    <style>
        /* ========================
           RESET & TEMEL
           ======================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f4f7f8;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 20px;
        }

        /* ========================
           DOSYA YÜKLEME ALANI
           ======================== */
        .upload-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            padding: 12px 24px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            max-width: 100%;
            flex-wrap: wrap;
        }

        .upload-btn {
            display: inline-block;
            background: #563df2;
            color: white;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .upload-btn:hover {
            background: #432dd6;
        }

        #file-input {
            display: none;
        }

        #file-status {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* ========================
           SAYAÇ
           ======================== */
        .counter {
            font-size: 18px;
            font-weight: 800;
            color: #071b49;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
        }

        /* ========================
           KART
           ======================== */
        .card-container {
            width: 720px;
            max-width: 100%;
            min-height: 320px;
            min-height: clamp(240px, 40vw, 320px);
            background: white;
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 45px;
            padding: clamp(24px, 5vw, 45px);
            text-align: center;
            cursor: pointer;
            perspective: 1000px;
            transition: transform 0.4s ease, opacity 0.25s ease;
            transform-style: preserve-3d;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .card-container.flip-effect {
            transform: rotateY(180deg);
        }

        .card-container.fade-out {
            opacity: 0;
            transform: rotateY(90deg);
        }

        .card-container h2,
        .card-container p {
            margin: 0;
            font-size: 42px;
            font-size: clamp(24px, 5.5vw, 42px);
            line-height: 1.3;
            font-weight: 800;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .card-container h2 {
            color: #071b49;
        }

        .card-container p {
            color: white;
            background: #071b49;
            width: 100%;
            padding: 70px 45px;
            padding: clamp(30px, 8vw, 70px) clamp(20px, 5vw, 45px);
            border-radius: 18px;
            box-sizing: border-box;
        }

        /* =============================================
           TIKLANABİLİR KELİMELER (İngilizce cümle içinde)
           ============================================= */
        .word-clickable {
            cursor: pointer;
            border-bottom: 2px dashed #563df2;
            transition: background 0.2s, color 0.2s;
            padding: 0 2px;
            border-radius: 4px;
            position: relative;
        }

        .word-clickable:hover {
            background: #563df2;
            color: white;
            border-bottom-color: white;
        }

        .word-clickable:active {
            transform: scale(0.95);
        }

        /* =============================================
           KELİME ÇEVİRİ TOOLTIP
           ============================================= */
        .word-tooltip {
            position: fixed;
            z-index: 1000;
            background: #071b49;
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            font-size: 18px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            max-width: 320px;
            white-space: nowrap;
        }

        .tooltip-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tooltip-content strong {
            font-size: 20px;
        }

        .tooltip-arrow {
            font-size: 18px;
            opacity: 0.7;
        }

        .tooltip-translation {
            font-weight: 400;
            font-size: 18px;
        }

        /* ========================
           "SONRAKİ CÜMLE" BUTONU
           ======================== */
        button#next-btn {
            position: fixed;
            left: 50%;
            bottom: 40px;
            top: auto;
            transform: translateX(-50%);
            background: #563df2;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px 45px;
            padding: 16px clamp(24px, 6vw, 45px);
            font-size: 22px;
            font-size: clamp(17px, 2.8vw, 22px);
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.15s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        button#next-btn:hover {
            background: #432dd6;
        }

        button#next-btn:active {
            transform: translateX(-50%) scale(0.96);
        }

        /* =============================================
           RESPONSIVE (MOBİL) — 768px ve altı
           ============================================= */
        @media (max-width: 768px) {
            body {
                gap: 16px;
                padding: 12px;
                justify-content: flex-start;
                padding-top: 40px;
            }

            .upload-area {
                padding: 10px 16px;
                gap: 8px;
                width: 100%;
            }

            .upload-btn {
                font-size: 14px;
                padding: 10px 18px;
            }

            #file-status {
                font-size: 12px;
                max-width: 140px;
            }

            .counter {
                font-size: 16px;
            }

            .card-container {
                width: 100%;
                min-height: 220px;
                border-radius: 18px;
                padding: 20px;
            }

            .card-container h2,
            .card-container p {
                font-size: 24px;
                line-height: 1.35;
            }

            .card-container p {
                padding: 30px 20px;
                border-radius: 14px;
            }

            button#next-btn {
                position: fixed;
                left: 16px;
                right: 16px;
                width: auto;
                bottom: 24px;
                padding: 16px 20px;
                font-size: 17px;
                border-radius: 14px;
                transform: none;
            }

            button#next-btn:active {
                transform: scale(0.97);
            }
        }

        /* =============================================
           ÇOK KÜÇÜK EKRANLAR — 400px ve altı
           ============================================= */
        @media (max-width: 400px) {
            body {
                padding: 8px;
                padding-top: 24px;
                gap: 12px;
            }

            .upload-area {
                padding: 8px 12px;
                gap: 6px;
            }

            .upload-btn {
                font-size: 12px;
                padding: 8px 14px;
            }

            #file-status {
                font-size: 11px;
                max-width: 100px;
            }

            .card-container {
                min-height: 180px;
                border-radius: 14px;
                padding: 16px;
            }

            .card-container h2,
            .card-container p {
                font-size: 20px;
            }

            .card-container p {
                padding: 24px 16px;
                border-radius: 12px;
            }

            button#next-btn {
                left: 12px;
                right: 12px;
                bottom: 16px;
                padding: 14px 16px;
                font-size: 15px;
            }
        }
    </style>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

    <!-- DOSYA YÜKLEME ALANI -->
    <div class="upload-area">
        <label for="file-input" class="upload-btn">📂 Excel / CSV Yükle</label>
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv">
        <span id="file-status">Henüz dosya yüklenmedi</span>
    </div>

    <!-- SAYAÇ -->
    <div class="counter" id="counter"></div>

    <!-- KART -->
    <div class="card-container" id="card"></div>

    <!-- SONRAKİ BUTON -->
    <button id="next-btn">Sonraki Cümle →</button>

    <script src="app.js"></script>
</body>
</html>
